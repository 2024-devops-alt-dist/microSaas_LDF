services:
  # Backend service (API)
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./api:/app
    env_file:
      - ./.env
    # depends_on:
    #   - mongodb

  # Frontend service
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '8080:80'
    volumes:
      - ./client:/app
    depends_on:
      - backend
