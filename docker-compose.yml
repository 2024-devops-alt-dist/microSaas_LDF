services:
  # Backend service (API)
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
    env_file:
      - ./.env
    depends_on:
      - mongodb

  # Frontend service
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./client:/app
    depends_on:
      - backend

  # DB service
  mongodb:
    image: mongo:6.0.4
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    volumes:
      - mongodb-data:/data/db

# Volumes to data persistance
volumes:
  mongodb-data:
