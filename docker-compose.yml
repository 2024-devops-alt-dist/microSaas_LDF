services:
  # Backend service (API)
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    command: npm run start:dev
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
      - /app/node_modules
    env_file:
      - ./api/.env
    depends_on:
      - mongodb

  # Frontend service
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend

  # DB service
  mongodb:
    image: mongo:6.0.4
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    volumes:
      - mongodb-data:/data/db

# Volumes to data persistance
volumes:
  mongodb-data:
