name: CI Checks
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm install --legacy-peer-deps
      - run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}"
      - run: npm run lint
      - run: npm audit --audit-level=critical

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm install --legacy-peer-deps
      - run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}"
      - run: npx eslint src --max-warnings=0 --quiet --no-error-on-unmatched-pattern
        env:
          CI: true
      - run: npm run build

  docker-checks:
    name: Docker Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./api/Dockerfile
      - name: Lint Client Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./client/Dockerfile

  integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: backend-checks
    defaults:
      run:
        working-directory: ./api
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm install --legacy-peer-deps
      - name: Run Integration Tests
        run: npm run test:integration
        env:
          DATABASE_URL: mongodb://localhost:27017/test_db
          JWT_SECRET: test_secret_key_integration

  playwright-e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install E2E dependencies
        run: |
          cd e2e
          npm install
          npx playwright install --with-deps chromium

      - name: Start Infrastructure (Docker Compose)
        run: docker-compose up -d --build
        env:
          MONGO_USER: root
          MONGO_PASS: root_password
          JWT_SECRET: e2e_test_secret_key
          VITE_API_URL: http://localhost:3000

      - name: Run Playwright tests
        run: |
          echo "Waiting for services to be ready (Vite & NestJS)..."
          sleep 30
          cd e2e
          npx playwright test
        env:
          BASE_URL: http://localhost:5173

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30
